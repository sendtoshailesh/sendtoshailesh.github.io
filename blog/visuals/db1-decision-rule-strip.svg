acing="0">Hitting one of the 4 walls?</text><text x="820.0" y="220" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#475569" text-anchor="middle" letter-spacing="0">Name it with a number.</text><text x="820.0" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="0">write rate  /  shard count</text><text x="820.0" y="298" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="0">latency floor  /  scan size</text><line x1="1046" y1="225.0" x2="1176" y2="205.0" stroke="#dc2626" stroke-width="6" marker-end="url(#ar_dc2626)"/><text x="1108.0" y="187.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#dc2626" text-anchor="middle" letter-spacing="0">YES</text><rect x="1182" y="150" width="348" height="110" rx="16" ry="16" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/><text x="1356.0" y="200" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#dc2626" text-anchor="middle" letter-spacing="0">-&gt; Specialize.</text><text x="1356.0" y="234" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="0">Name the wall.</text><line x1="1046" y1="225.0" x2="1176" y2="385.0" stroke="#16a34a" stroke-width="6" marker-end="url(#ar_16a34a)"/><text x="1108.0" y="415.0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#16a34a" text-anchor="middle" letter-spacing="0">NO</text><rect x="1182" y="320" width="348" height="130" rx="16" ry="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="1356.0" y="376" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#475569" text-anchor="middle" letter-spacing="0">-&gt; Just use</text><text x="1356.0" y="420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="#16a34a" text-anchor="middle" letter-spacing="0">Postgres.</text><rect x="70" y="520" width="1460" height="96" rx="16" ry="16" fill="#f8fafc" stroke="#e5e7eb" stroke-width="2"/><text x="800.0" y="566" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#1e293b" text-anchor="middle" letter-spacing="0">Can&#x27;t name the wall with a number? You haven&#x27;t hit one  -&gt;  just use Postgres.</text><text x="800.0" y="600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#475569" text-anchor="middle" letter-spacing="0">The four walls: write throughput  /  planet-scale sharding  /  sub-ms key-value  /  petabyte OLAP.</text><text x="70" y="680" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#94a3b8" text-anchor="start" letter-spacing="0">Source: just-use-postgres.md (the decision rule); verified 2026-06-26.</text></svg>